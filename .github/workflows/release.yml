name: Build & Release Mambo Pedidos

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.1.0). Leave empty to skip release creation.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Setup signing key (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $secret = @"
          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          "@.Trim()
          $keyText = $secret
          if (-not $secret.StartsWith("untrusted comment:")) {
              try {
                  $bytes = [System.Convert]::FromBase64String($secret)
                  $decoded = [System.Text.Encoding]::UTF8.GetString($bytes)
                  if ($decoded.StartsWith("untrusted comment:")) {
                      $keyText = $decoded
                  }
              } catch {}
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TAURI_SIGNING_PRIVATE_KEY<<EOF`n$keyText`nEOF`n", $utf8NoBom)

      - name: Setup signing key (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          secret=$(cat << 'EOF'
          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          EOF
          )
          secret=$(echo "$secret" | tr -d '\r')
          if [[ "$secret" == untrusted\ comment:* ]]; then
              keyText="$secret"
          else
              decoded=$(echo "$secret" | base64 --decode 2>/dev/null || echo "$secret")
              if [[ "$decoded" == untrusted\ comment:* ]]; then
                  keyText="$decoded"
              else
                  keyText="$secret"
              fi
          fi
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            echo "$keyText"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=dev-build" >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri App & Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: 'Mambo Pedidos ${{ steps.tag.outputs.name }}'
          releaseBody: 'Instaladores nativos de Mambo Pedidos para Windows (.exe / .msi), Linux (.AppImage / .deb) y macOS. El actualizador automático in-place descarga solo el parche firmado sin desinstalar.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
