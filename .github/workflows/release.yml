name: Build & Release Mambo Pedidos

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.1.0). Leave empty to skip release creation.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      # The TAURI_SIGNING_PRIVATE_KEY secret is stored as the base64-encoded content
      # of the minisign .key file. We decode it here so Tauri receives the raw text
      # (starting with "untrusted comment: ...") that it expects.
      - name: Decode signing key (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $b64 = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($b64.Trim()))
          "TAURI_SIGNING_PRIVATE_KEY<<EOF`n$decoded`nEOF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Decode signing key (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          decoded=$(printf '%s' "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | base64 --decode)
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            echo "$decoded"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=dev-build" >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri App & Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: 'Mambo Pedidos ${{ steps.tag.outputs.name }}'
          releaseBody: 'Instaladores nativos de Mambo Pedidos para Windows (.exe / .msi), Linux (.AppImage / .deb) y macOS. El actualizador automático in-place descarga solo el parche firmado sin desinstalar.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
