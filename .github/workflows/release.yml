name: Build & Release Mambo Pedidos

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: mambo-pedidos-linux
            asset_name: mambo-pedidos-linux.tar.gz
          - target: x86_64-pc-windows-msvc
            artifact_name: mambo-pedidos-windows
            asset_name: mambo-pedidos-windows.zip
          - target: x86_64-apple-darwin
            artifact_name: mambo-pedidos-macos
            asset_name: mambo-pedidos-macos.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux deps
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: List build output
        run: ls -la src-tauri/target/${{ matrix.target }}/release/bundle/

      - name: Package artifacts
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle
          mkdir -p ../../../out
          if [ -d "msi" ]; then
            cp -r msi/* ../../../out/
          fi
          if [ -d "nsis" ]; then
            cp -r nsis/* ../../../out/
          fi
          if [ -d "deb" ]; then
            cp -r deb/* ../../../out/
          fi
          if [ -d "appimage" ]; then
            cp -r appimage/* ../../../out/
          fi
          if [ -d "dmg" ]; then
            cp -r dmg/* ../../../out/
          fi
          if [ -d "macos" ]; then
            cp -r macos/* ../../../out/
          fi
          cd ../../../out
          ls -la
          if [ -f *.msi ] || [ -f *.exe ] || [ -f *.dmg ] || [ -f *.AppImage ] || [ -f *.deb ]; then
            if [[ "${{ matrix.target }}" == *"windows"* ]]; then
              7z a ../${{ matrix.asset_name }} * || zip -r ../${{ matrix.asset_name }} *
            else
              tar -czf ../${{ matrix.asset_name }} *
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
